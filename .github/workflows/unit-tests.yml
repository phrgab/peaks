name: Unit tests

on:
  pull_request: # triggers on PR open or update
  push: # triggers on any branch push
    branches:
      - "**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install peaks with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with pytest
        run: pytest
